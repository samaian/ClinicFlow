<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Template</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f4f4; font-family:Arial, Helvetica, sans-serif;">

    <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f4f4f4; padding:30px 0;">
        <tr>
            <td align="center">

                <table width="600" cellpadding="0" cellspacing="0" border="0"
                       style="background:#ffffff; border-radius:12px; overflow:hidden;">

                    <!-- Header -->
                    <tr>
                        <td align="center"
                            style="background:#2563eb; color:white; padding:30px;">
                            <h1 style="margin:0;">Clinic Flow</h1>
                            <p style="margin-top:10px;">Welcome to our platform</p>
                        </td>
                    </tr>

                    <!-- Body -->
                    <tr>
                        <td style="padding:40px; color:#333333;">

                            <h2 style="margin-top:0;">Hello {{User}} 👋</h2>

                            <p style="font-size:16px; line-height:1.7;">
                                please press on the (Confirm Email) below to confirm your Email
                            </p>

                            <div style="text-align:center; margin:35px 0;">

                                <a href="{{link}}"
                                   style="
                                        background:#2563eb;
                                        color:white;
                                        text-decoration:none;
                                        padding:14px 28px;
                                        border-radius:8px;
                                        display:inline-block;
                                        font-size:16px;
                                        font-weight:bold;
                                   ">
                                    Confirm Email
                                </a>

                            </div>

                            <p style="font-size:14px; color:#666666;">
                                If you did not create this account, you can safely ignore this email.
                            </p>

                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td align="center"
                            style="padding:20px; background:#f9fafb; color:#888888; font-size:13px;">

                            © 2026 ClinicFlow. All rights reserved.

                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>

</body>
</html>
